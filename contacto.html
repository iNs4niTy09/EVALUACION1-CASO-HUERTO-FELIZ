    <header class="text-center text-white bg-success py-5">
    <h1>Contáctanos</h1>
    <p>Estamos aquí para ayudarte con tu jardín</p>
  </header>

  <section class="container my-3">
    <div class="logo">
        <a href="index.html">
            <img src="imgs/logo.png" alt="Huerto Feliz">
        </a>
  </div>
  </section>

    <section class="container my-5">
    <h2 class="text-center mb-4">Envíanos un mensaje</h2>
    <form class="row g-3">
      <div class="col-md-6">
        <input type="text" class="form-control" placeholder="Nombre" required>
      </div>
      <div class="col-md-6">
        <input type="email" class="form-control" placeholder="Correo electrónico" required>
      </div>
      <div class="col-md-6">
        <input type="tel" class="form-control" placeholder="Teléfono">
      </div>
      <div class="col-md-6">
        <input type="text" class="form-control" placeholder="Asunto">
      </div>
      <div class="col-12">
        <textarea class="form-control" rows="4" placeholder="Escribe tu mensaje aquí..." required></textarea>
      </div>
      <div class="col-12 text-center">
        <button type="submit" class="btn btn-success px-4">Enviar</button>
      </div>
    </form>
  </section>

  <section class="container text-center my-5">
    <h2 class="mb-4">Información de contacto</h2>
    <p><i class="bi bi-telephone-fill"></i> +56 9 1234 5678</p>
    <p><i class="bi bi-envelope-fill"></i> contacto@huertofeliz.cl</p>
    <p><i class="bi bi-facebook"></i> Huerto Feliz | <i class="bi bi-instagram"></i> @huertofeliz</p>
